<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi Amor ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Josefin+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style src= style.css>
</head>
<body>

<div class="stage">

  <!-- SOBRE -->
  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope">
      <div class="env-flap" id="envFlap"></div>
      <div class="env-body"></div>
      <div class="env-seal" id="envSeal"><span>❤</span></div>
    </div>
    <p class="tap-hint">TOCA PARA ABRIR</p>
  </div>

  <!-- CARTA -->
  <div class="letter-wrap" id="letterWrap">
    <div class="letter">
      <button class="close-btn" onclick="closeEnvelope()" aria-label="Cerrar">&times;</button>
      <div class="letter-header">
        <p class="to">Para mi Amor <span class="heart">❤️</span></p>
      </div>
      <p class="countdown-line">3/2 DÍAS MÁS</p>
      <p class="date-line">22 / 07 / 26</p>
      <div class="divider"></div>

      <div class="body-text">
        <p>Hoy, miércoles 22 de julio, me desperté solo pensando en ti, como todos los días.</p>
        <p>Te mandé un mensaje queriendo que, cuando despertaras, pensaras en mí. Puede ser atrevido después de lo de ayer, y este mensaje o carta también lo es.</p>
        <p>Es bastante raro que, un día después de que casi pierdo al amor de mi vida, esté haciendo esto.</p>
        <p>Se puede tomar como eso que se hace por desesperación y que dejaré de hacer cuando todo mejore. Pero sé que te gustaría recibir algo así todos los días cuando todo esté bien. Aún no me decido qué hacer, pero voy a hacer algo. Lo voy a hacer.</p>
        <p>Por cierto, me encuentro en mi trabajo y estoy escribiendo esto. Te parecerá una mala idea, pero ya acabé todo lo que me tocaba hacer; solo queda esperar.</p>
        <p>Estoy pensando si hacer un origami o tal vez una carta. Bueno, la carta ya la estoy haciendo, jajaja. ¿Por qué no ambos? O esta noche sentarme al piano digital e intentar tocar algo. No sé qué saldría.</p>
        <p>Hay toda clase de emociones.</p>
        <p>¿Cómo está mi corazón? Todos los 21... Pepito lo mismo, de 10:00 p. m. a 11:00 p. m. ¿Cómo está mi corazón? Puedo decir que lo único que hay en mi corazón es esperanza.</p>
      </div>

      <div class="signature">
        <p>De: Aris Daniel</p>
        <p>Para: Laura Contreras ❤️</p>
      </div>

      <div class="ps">
        <p>P. D.: Tenía esto en el proyecto de la nueva página que estoy haciendo para ti, así que mejor lo uso acá también. Creo que quedaría bien una galería de este tipo.</p>
      </div>

    </div>
  </div>

</div>

<script>
  function openEnvelope(){
    document.getElementById('envFlap').classList.add('opened');
    document.getElementById('envSeal').classList.add('fade');
    setTimeout(function(){
      document.getElementById('envelopeWrap').classList.add('hide');
      document.getElementById('letterWrap').classList.add('show');
    }, 500);
  }
  function closeEnvelope(){
    document.getElementById('letterWrap').classList.remove('show');
    setTimeout(function(){
      document.getElementById('envelopeWrap').classList.remove('hide');
      document.getElementById('envFlap').classList.remove('opened');
      document.getElementById('envSeal').classList.remove('fade');
    }, 400);
  }
  document.getElementById('envelopeWrap').addEventListener('click', openEnvelope);
</script>

</body>
  </html>
